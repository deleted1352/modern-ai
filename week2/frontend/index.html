<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Action Item Extractor</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif; margin: 2rem auto; max-width: 800px; padding: 0 1rem; }
      h1 { font-size: 1.5rem; }
      h2 { font-size: 1.125rem; margin-bottom: 0.75rem; }
      textarea { width: 100%; min-height: 160px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace; margin-bottom: 0.5rem; }
      button { padding: 0.5rem 1rem; cursor: pointer; border-radius: 0.25rem; border: 1px solid #d1d5db; background: #fff; }
      button.primary { background-color: #2563eb; color: white; border: none; }
      .items { margin-top: 1rem; margin-bottom: 2rem; }
      .item { display: flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0; }
      .muted { color: #6b7280; font-size: 0.875rem; }
      .row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-top: 0.5rem; }
      .history-section { border-top: 2px solid #e5e7eb; padding-top: 1.5rem; margin-top: 2rem; }
      .note-card { border: 1px solid #e5e7eb; padding: 1rem; margin-bottom: 1rem; border-radius: 0.375rem; background-color: #f9fafb; }
      .note-text { color: #374151; margin: 0.5rem 0; white-space: pre-wrap; }
      .note-card .items { margin-top: 0.5rem; margin-bottom: 0; }
    </style>
  </head>
  <body>
    <h1>Action Item Extractor</h1>
    <p class="muted">Paste notes and extract actionable items using heuristics or a local LLM.</p>

    <label for="text">Notes</label>
    <textarea id="text" placeholder="Paste notes here...
e.g.
- [ ] Set up database
- Implement extract endpoint"></textarea>

    <div class="row">
      <label class="row"><input id="save_note" type="checkbox" checked /> Save as note (heuristic only)</label>
      <button id="extract">Extract (Heuristic)</button>
      <button id="extract_llm" class="primary">Extract (LLM AI)</button>
    </div>

    <div class="items" id="items"></div>

    <div class="history-section">
      <h2>Saved Notes History</h2>
      <button id="list_notes">📋 List All Notes</button>
      <div id="notes_list" style="margin-top: 1rem;"></div>
    </div>

    <script>
      const $ = (sel) => document.querySelector(sel);
      const itemsEl = $('#items');
      const notesListEl = $('#notes_list');

      function renderActionItems(container, itemsArray) {
        if (!itemsArray || itemsArray.length === 0) {
          container.innerHTML = '<p class="muted">No action items found.</p>';
          return;
        }

        container.innerHTML = itemsArray.map((it) => (
          `<div class="item">
            <input type="checkbox" data-id="${it.id}" ${it.done ? 'checked' : ''} />
            <span>${it.text}</span>
          </div>`
        )).join('');

        container.querySelectorAll('input[type="checkbox"]').forEach((cb) => {
          cb.addEventListener('change', async (e) => {
            const id = e.target.getAttribute('data-id');
            if (!id) return;
            try {
              await fetch(`/action-items/${id}/done`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ done: e.target.checked }),
              });
            } catch (err) {
              console.error('Failed to update task state:', err);
            }
          });
        });
      }

      async function handleHeuristicExtraction() {
        const text = $('#text').value;
        const save = $('#save_note').checked;
        itemsEl.textContent = 'Extracting...';

        try {
          const res = await fetch('/action-items/extract', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text, save_note: save }),
          });
          if (!res.ok) throw new Error('Heuristic extraction failed');

          const data = await res.json();
          renderActionItems(itemsEl, data.items);
        } catch (err) {
          console.error(err);
          itemsEl.textContent = 'Error extracting items';
        }
      }

      async function handleLlmExtraction() {
        const content = $('#text').value;
        itemsEl.textContent = 'Extracting with LLM...';

        try {
          const res = await fetch('/notes/extract-llm', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content }),
          });
          if (!res.ok) throw new Error('LLM extraction failed');

          const data = await res.json();
          renderActionItems(itemsEl, data.items);
        } catch (err) {
          console.error(err);
          itemsEl.textContent = 'Error extracting items via LLM';
        }
      }

      async function listAllNotes() {
        notesListEl.textContent = 'Loading history...';

        try {
          const res = await fetch('/notes');
          if (!res.ok) throw new Error('Failed to retrieve notes');

          const notes = await res.json();
          if (!notes || notes.length === 0) {
            notesListEl.innerHTML = '<p class="muted">No saved notes found in the database.</p>';
            return;
          }

          notesListEl.innerHTML = notes.map((note) => (
            `<div class="note-card">
              <div class="muted">Note #${note.id}${note.created_at ? ` · ${note.created_at}` : ''}</div>
              <p class="note-text">${note.content}</p>
              <div class="items" id="note-items-${note.id}"></div>
            </div>`
          )).join('');

          notes.forEach((note) => {
            const container = document.getElementById(`note-items-${note.id}`);
            const actionItems = (note.action_items || []).map((item) => ({
              id: item.id,
              text: item.text,
              done: Boolean(item.done),
            }));
            renderActionItems(container, actionItems);
          });
        } catch (err) {
          console.error(err);
          notesListEl.textContent = 'Error loading history records';
        }
      }

      $('#extract').addEventListener('click', handleHeuristicExtraction);
      $('#extract_llm').addEventListener('click', handleLlmExtraction);
      $('#list_notes').addEventListener('click', listAllNotes);
    </script>
  </body>
</html>
